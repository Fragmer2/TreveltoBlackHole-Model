
<style>
* { box-sizing: border-box; }
#wrap { background: #07090f; border-radius: 12px; overflow: hidden; }
canvas { display: block; width: 100%; }
#controls { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #0d1117; border-top: 0.5px solid #1e2430; }
#phase-box { background: #0d1117; border-top: 0.5px solid #1e2430; padding: 10px 14px; }
.phase-title { font: 500 13px sans-serif; color: #e2e8f0; margin: 0 0 2px; }
.phase-desc  { font: 400 11px sans-serif; color: #7a8499; margin: 0; }
button { background: transparent; border: 0.5px solid #2a3448; color: #c4cde0; font: 400 12px sans-serif; padding: 5px 14px; border-radius: 6px; cursor: pointer; }
button:hover { background: #1a2235; }
.stat { font: 400 11px sans-serif; color: #7a8499; }
.stat b { color: #c4cde0; font-weight: 500; }
#spd { margin-left: auto; }
</style>

<div id="wrap">
<canvas id="c" height="480"></canvas>
<div id="controls">
  <button id="btnPlay">Pause</button>
  <button id="btnReset">Reset</button>
  <span class="stat">Phase: <b id="phaseName">Launch</b></span>
  <span class="stat" id="spd">Speed: <b id="spdVal">—</b></span>
</div>
<div id="phase-box">
  <p class="phase-title" id="phaseTitle">Launching from Earth</p>
  <p class="phase-desc"  id="phaseDesc">Initial velocity ~12 km/s after escape burn. Heading toward Venus for gravity assist.</p>
</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 680, H = 480;
canvas.width = W; canvas.height = H;
const cx = W/2, cy = H/2;

const AU = 46;
const r = { sun:10, mercury:2.5, venus:4, earth:4.5, mars:3.5, jupiter:14 };
const orb = { venus:0.72*AU, earth:1*AU, mars:1.52*AU, jupiter:4.8*AU };
const col = { venus:'#e8c56b', earth:'#4a9eff', mars:'#d4613a', jupiter:'#c8a97a', sun:'#ffe566' };

const phases = [
  { name:'Launch',          title:'1. Launch from Earth',           desc:'Escape burn ~3.2 km/s. Craft heads to Venus on a Hohmann-like arc. Speed ~30 km/s relative to Sun.',   speed:'~30 km/s' },
  { name:'Venus flyby',     title:'2. Venus gravity assist',        desc:'Fly behind Venus. Planet\'s gravity bends the trajectory inward, lowering perihelion toward the Sun.',   speed:'~35 km/s' },
  { name:'Fall to Sun',     title:'3. Falling toward the Sun',      desc:'Gravity accelerates the craft to ~240 km/s at closest approach (7 million km from Sun surface).',        speed:'~240 km/s' },
  { name:'Oberth #1',       title:'4. Oberth maneuver #1 at Sun',   desc:'Engine fires Δv = 5 km/s at perihelion. Exponential amplification: effective gain ~30 km/s.',           speed:'~270 km/s' },
  { name:'To Jupiter',      title:'5. Transfer to Jupiter',         desc:'High-energy arc out to Jupiter (5.2 AU). Travel time ~20 months. Speed drops as craft climbs gravity well.', speed:'~18 km/s' },
  { name:'Jupiter flyby 1', title:'6. Jupiter gravity assist #1',   desc:'Fly behind Jupiter. Gain Δv ≈ 5–10 km/s from the planet\'s enormous gravity well.',                     speed:'~25 km/s' },
  { name:'Return to Sun',   title:'7. Return to Sun for Oberth #2', desc:'Craft dives back to inner solar system. Accelerates to ~240 km/s again in perihelion.',                  speed:'~240 km/s' },
  { name:'Oberth #2',       title:'8. Oberth maneuver #2 at Sun',   desc:'Second engine burn at perihelion. Another ~30 km/s effective gain. Total now exceeds 300 km/s.',         speed:'~300 km/s' },
  { name:'Jupiter flyby 2', title:'9. Jupiter gravity assist #2',   desc:'Second Jupiter flyby adds ~5–10 km/s more. Craft now on hyperbolic escape trajectory.',                  speed:'~320 km/s' },
  { name:'Exit',            title:'10. Interstellar exit',          desc:'Final speed ~320–400 km/s. Craft escapes solar system. Heading toward Gaia BH1 (~1,600 light-years away).', speed:'~350 km/s' },
];

const pathPts = [];
function buildPath() {
  pathPts.length = 0;
  const steps = 1200;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    pathPts.push(getPos(t));
  }
}

function getPos(t) {
  if (t < 0.08) {
    const u = t / 0.08;
    const ea = -Math.PI*0.15;
    const sx = cx + orb.earth * Math.cos(ea);
    const sy = cy + orb.earth * Math.sin(ea);
    const va = -Math.PI*0.55;
    const vx = cx + orb.venus * Math.cos(va);
    const vy = cy + orb.venus * Math.sin(va);
    return bezier3(u, sx, sy, sx-20, sy-60, vx+30, vy+40, vx, vy);
  }
  if (t < 0.16) {
    const u = (t-0.08)/0.08;
    const va = -Math.PI*0.55;
    const vx = cx + orb.venus * Math.cos(va);
    const vy = cy + orb.venus * Math.sin(va);
    return bezier3(u, vx, vy, vx-15, vy-20, cx+8, cy-6, cx+4, cy-3);
  }
  if (t < 0.18) {
    const u = (t-0.16)/0.02;
    const x = cx + 4*(1-u);
    const y = cy - 3*(1-u);
    return {x, y};
  }
  if (t < 0.35) {
    const u = (t-0.18)/0.17;
    const ja = Math.PI*0.25;
    const jx = cx + orb.jupiter * Math.cos(ja);
    const jy = cy + orb.jupiter * Math.sin(ja);
    return bezier3(u, cx, cy, cx+80, cy+40, jx-60, jy-40, jx, jy);
  }
  if (t < 0.52) {
    const u = (t-0.35)/0.17;
    const ja = Math.PI*0.25;
    const jx = cx + orb.jupiter * Math.cos(ja);
    const jy = cy + orb.jupiter * Math.sin(ja);
    return bezier3(u, jx, jy, jx+50, jy+60, cx+30, cy+10, cx+5, cy+2);
  }
  if (t < 0.54) {
    const u = (t-0.52)/0.02;
    const x = cx + 5*(1-u);
    const y = cy + 2*(1-u);
    return {x, y};
  }
  if (t < 0.72) {
    const u = (t-0.54)/0.18;
    const ja = Math.PI*0.85;
    const jx = cx + orb.jupiter * Math.cos(ja);
    const jy = cy + orb.jupiter * Math.sin(ja);
    return bezier3(u, cx, cy, cx-60, cy+50, jx+50, jy-30, jx, jy);
  }
  const u = (t-0.72)/0.28;
  const ja = Math.PI*0.85;
  const jx = cx + orb.jupiter * Math.cos(ja);
  const jy = cy + orb.jupiter * Math.sin(ja);
  const ex = cx + (-220);
  const ey = cy + 180;
  return bezier3(u, jx, jy, jx-80, jy+60, ex-40, ey-30, ex, ey);
}

function bezier3(t, x0,y0,x1,y1,x2,y2,x3,y3) {
  const mt = 1-t;
  return {
    x: mt*mt*mt*x0 + 3*mt*mt*t*x1 + 3*mt*t*t*x2 + t*t*t*x3,
    y: mt*mt*mt*y0 + 3*mt*mt*t*y1 + 3*mt*t*t*y2 + t*t*t*y3,
  };
}

function phaseAt(t) {
  if (t < 0.08) return 0;
  if (t < 0.16) return 1;
  if (t < 0.18) return 2;
  if (t < 0.20) return 3;
  if (t < 0.35) return 4;
  if (t < 0.37) return 5;
  if (t < 0.52) return 6;
  if (t < 0.54) return 7;
  if (t < 0.72) return 8;
  return 9;
}

buildPath();

let progress = 0;
let running = true;
let animId;
let lastPhase = -1;

function drawOrbit(r2, color) {
  ctx.beginPath();
  ctx.arc(cx, cy, r2, 0, Math.PI*2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3,5]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlanet(x, y, radius, color, label) {
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#9ba8be';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - radius - 4);
}

function drawSun() {
  ctx.beginPath();
  ctx.arc(cx, cy, r.sun, 0, Math.PI*2);
  ctx.fillStyle = '#ffe566';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, r.sun+4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,229,102,0.25)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawTrail() {
  const len = pathPts.length;
  const end = Math.floor(progress * len);
  if (end < 2) return;
  for (let i = 1; i < end; i++) {
    const frac = i / len;
    const a = Math.min(1, (end - i) / 180);
    const ph = phaseAt(frac);
    let strokeCol;
    if (ph <= 1) strokeCol = `rgba(74,158,255,${a})`;
    else if (ph <= 3) strokeCol = `rgba(255,200,80,${a})`;
    else if (ph <= 5) strokeCol = `rgba(100,200,140,${a})`;
    else if (ph <= 7) strokeCol = `rgba(255,200,80,${a})`;
    else strokeCol = `rgba(200,120,220,${a})`;
    ctx.beginPath();
    ctx.moveTo(pathPts[i-1].x, pathPts[i-1].y);
    ctx.lineTo(pathPts[i].x, pathPts[i].y);
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }
}

function drawCraft() {
  const idx = Math.floor(progress * (pathPts.length-1));
  const p = pathPts[idx];
  ctx.beginPath();
  ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(p.x, p.y, 6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawManeuverMarkers() {
  const markers = [
    { t:0.175, label:'Oberth #1', col:'#ffe566' },
    { t:0.36,  label:'Jupiter GA 1', col:'#c8a97a' },
    { t:0.535, label:'Oberth #2', col:'#ffe566' },
    { t:0.73,  label:'Jupiter GA 2', col:'#c8a97a' },
  ];
  markers.forEach(m => {
    if (progress < m.t - 0.01) return;
    const idx = Math.floor(m.t * (pathPts.length-1));
    const p = pathPts[idx];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 7, 0, Math.PI*2);
    ctx.strokeStyle = m.col;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    if (progress >= m.t) {
      ctx.font = '10px sans-serif';
      ctx.fillStyle = m.col;
      ctx.textAlign = 'left';
      ctx.fillText(m.label, p.x+10, p.y-4);
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#07090f';
  ctx.fillRect(0,0,W,H);

  for (let i = 0; i < 120; i++) {
    const sx = (Math.sin(i*137.5)*0.5+0.5)*W;
    const sy = (Math.cos(i*97.3)*0.5+0.5)*H;
    const sa = 0.2 + Math.sin(i*31)*0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${sa})`;
    ctx.fill();
  }

  drawOrbit(orb.venus,   'rgba(232,197,107,0.25)');
  drawOrbit(orb.earth,   'rgba(74,158,255,0.25)');
  drawOrbit(orb.mars,    'rgba(212,97,58,0.2)');
  drawOrbit(orb.jupiter, 'rgba(200,169,122,0.2)');

  const ea = -Math.PI*0.15;
  const va = -Math.PI*0.55;
  const j1a = Math.PI*0.25;
  const j2a = Math.PI*0.85;

  drawTrail();
  drawManeuverMarkers();

  drawSun();
  drawPlanet(cx + orb.venus*Math.cos(va),   cy + orb.venus*Math.sin(va),   r.venus,   col.venus,   'Venus');
  drawPlanet(cx + orb.earth*Math.cos(ea),   cy + orb.earth*Math.sin(ea),   r.earth,   col.earth,   'Earth');
  drawPlanet(cx + orb.jupiter*Math.cos(j1a),cy + orb.jupiter*Math.sin(j1a),r.jupiter, col.jupiter, 'Jupiter');
  drawPlanet(cx + orb.jupiter*Math.cos(j2a),cy + orb.jupiter*Math.sin(j2a),r.jupiter*.7, col.jupiter, '');

  drawCraft();

  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(155,168,190,0.6)';
  ctx.textAlign = 'left';
  ctx.fillText('Scale compressed — orbits not to true proportion', 10, H-10);
}

function updateUI() {
  const ph = phaseAt(progress);
  if (ph !== lastPhase) {
    lastPhase = ph;
    const p = phases[ph];
    document.getElementById('phaseName').textContent  = p.name;
    document.getElementById('phaseTitle').textContent = p.title;
    document.getElementById('phaseDesc').textContent  = p.desc;
    document.getElementById('spdVal').textContent     = p.speed;
  }
}

function loop() {
  if (running) {
    progress = Math.min(1, progress + 0.0008);
    if (progress >= 1) { running = false; document.getElementById('btnPlay').textContent = 'Play'; }
  }
  draw();
  updateUI();
  animId = requestAnimationFrame(loop);
}

document.getElementById('btnPlay').onclick = function() {
  running = !running;
  this.textContent = running ? 'Pause' : 'Play';
  if (running && progress >= 1) { progress = 0; lastPhase = -1; }
};
document.getElementById('btnReset').onclick = function() {
  progress = 0; lastPhase = -1; running = true;
  document.getElementById('btnPlay').textContent = 'Pause';
};

loop();
</script>
